name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Lint with ruff
      run: |
        ruff check .
        ruff format --check .

    - name: Lint with pylint
      run: |
        # We allow the job to continue even if pylint fails for now,
        # or we can set a threshold.
        # Based on previous session, the score was 9.14.
        pylint *.py tests/*.py --fail-under=8.0

    - name: Test with pytest
      run: |
        pytest
