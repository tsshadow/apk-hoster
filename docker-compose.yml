version: '3.8'

services:
  apk-hoster:
    image: ${DOCKER_IMAGE}:latest
    container_name: apk-hoster
    ports:
      - "8275:8275"
    environment:
      - UPLOAD_PASSWORD=${UPLOAD_PASSWORD}
      - ALLOWED_IPS=${ALLOWED_IPS}
      - APP_NAME=${APP_NAME:-ultrasonic}
    volumes:
      - ${REMOTE_DIST_PATH}:/mnt/apks
    restart: always
